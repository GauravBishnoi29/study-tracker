<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Battery Tracker</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e232e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #8b92a8;
    --text3: #555d72;
    --green: #1D9E75;
    --green-dim: #0f6e56;
    --amber: #d4870a;
    --red: #c94040;
    --accent: #1D9E75;
    --radius: 14px;
    --mono: 'DM Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 44px;
  }

  header h1 {
    font-size: 13px;
    font-family: var(--mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  header .week-label {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  header .week-label span {
    color: var(--accent);
  }

  .main-layout {
    display: flex;
    gap: 36px;
    align-items: flex-start;
    max-width: 680px;
    width: 100%;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ---- Battery ---- */
  .battery-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }

  .battery-cap {
    width: 42px;
    height: 12px;
    background: var(--border2);
    border-radius: 6px 6px 0 0;
    border: 1.5px solid var(--border2);
    border-bottom: none;
  }

  .battery-body {
    width: 110px;
    height: 440px;
    border: 2px solid var(--border2);
    border-radius: 14px;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    cursor: default;
  }

  .battery-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 0%;
    background: var(--green);
    transition: height 0.7s cubic-bezier(.4,0,.2,1), background 0.4s;
    border-radius: 0 0 12px 12px;
  }

  .battery-glow {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to top, rgba(29,158,117,0.25), transparent);
    transition: opacity 0.5s;
    pointer-events: none;
  }

  .seg-lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }

  .seg-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.05);
  }

  .battery-pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
    z-index: 3;
    text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    letter-spacing: -1px;
  }

  .battery-sublabel {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-align: center;
    margin-top: 10px;
  }

  /* ---- Right panel ---- */
  .panel {
    flex: 1;
    min-width: 260px;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .goal-section label {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    display: block;
    margin-bottom: 10px;
  }

  .goal-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 4px rgba(29,158,117,0.2);
  }

  .goal-val {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    min-width: 44px;
    text-align: right;
  }

  /* Day rows */
  .days-section label {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    display: block;
    margin-bottom: 10px;
  }

  .day-rows { display: flex; flex-direction: column; gap: 8px; }

  .day-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    transition: border-color 0.2s;
  }

  .day-row:hover { border-color: var(--border2); }
  .day-row.has-hours { border-color: rgba(29,158,117,0.3); }

  .day-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    width: 30px;
    flex-shrink: 0;
  }

  .day-row input[type=number] {
    width: 56px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 5px 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .day-row input[type=number]::-webkit-inner-spin-button { display: none; }
  .day-row input[type=number]:focus { border-color: var(--accent); }

  .day-unit {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    flex-shrink: 0;
  }

  .day-bar-wrap {
    flex: 1;
    height: 5px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .day-bar {
    height: 100%;
    width: 0%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    display: block;
  }

  .stat-lbl {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.08em;
    margin-top: 3px;
    display: block;
    text-transform: uppercase;
  }

  .reset-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .reset-btn:hover { border-color: var(--border2); color: var(--text2); }

  .motivation {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--accent);
    text-align: center;
    min-height: 18px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .motivation.show { opacity: 1; }

  /* Confetti burst (pure CSS dot) */
  @keyframes pop { 0%{transform:scale(0);opacity:1} 100%{transform:scale(2.5);opacity:0} }
  .burst {
    position: fixed;
    pointer-events: none;
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: pop 0.6s ease-out forwards;
  }

  @media (max-width: 560px) {
    .main-layout { flex-direction: column; align-items: center; }
    .battery-body { height: 320px; }
    .panel { min-width: unset; width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>Study Battery</h1>
  <div class="week-label" id="week-label">Loading week...</div>
</header>

<div class="main-layout">

  <!-- Battery -->
  <div class="battery-wrap">
    <div class="battery-cap"></div>
    <div class="battery-body">
      <div class="battery-fill" id="battery-fill"></div>
      <div class="battery-glow" id="battery-glow"></div>
      <div class="seg-lines" id="seg-lines"></div>
      <div class="battery-pct" id="pct-label">0%</div>
    </div>
    <div class="battery-sublabel">goal: <span id="goal-display">40</span> hrs/wk</div>
  </div>

  <!-- Panel -->
  <div class="panel">

    <div class="goal-section">
      <label>Weekly goal</label>
      <div class="goal-row">
        <input type="range" id="goal-slider" min="5" max="80" value="40" step="1" oninput="updateGoal(this.value)">
        <span class="goal-val" id="goal-val">40 h</span>
      </div>
    </div>

    <div class="days-section">
      <label>Hours per day</label>
      <div class="day-rows" id="day-rows"></div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <span class="stat-val" id="total-val">0</span>
        <span class="stat-lbl">total hrs</span>
      </div>
      <div class="stat-box">
        <span class="stat-val" id="remain-val">40</span>
        <span class="stat-lbl">remaining</span>
      </div>
      <div class="stat-box">
        <span class="stat-val" id="avg-val">—</span>
        <span class="stat-lbl">avg / day</span>
      </div>
    </div>

    <div class="motivation" id="motivation"></div>

    <button class="reset-btn" onclick="resetAll()">↺ reset week</button>

  </div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const QUOTES = [
  '🔋 Fully charged!',
  '⚡ Week complete — legend.',
  '🏆 100% — you crushed it!',
  '🌟 Perfect week achieved!'
];
const STORAGE_KEY = 'study_battery_v1';

let hours = [0,0,0,0,0,0,0];
let goal = 40;

function getWeekLabel() {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(now.setDate(diff));
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
  return `${fmt(mon)} – ${fmt(sun)}`;
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ hours, goal }));
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d) {
      hours = d.hours || hours;
      goal = d.goal || goal;
    }
  } catch(e) {}
}

function buildRows() {
  const container = document.getElementById('day-rows');
  container.innerHTML = '';
  DAYS.forEach((d, i) => {
    const row = document.createElement('div');
    row.className = 'day-row' + (hours[i] > 0 ? ' has-hours' : '');
    row.id = 'row-' + i;
    row.innerHTML = `
      <span class="day-name">${d}</span>
      <input type="number" id="inp-${i}" min="0" max="24" step="0.5"
        value="${hours[i] > 0 ? hours[i] : ''}" placeholder="0"
        oninput="handleInput(${i}, this.value)">
      <span class="day-unit">h</span>
      <div class="day-bar-wrap">
        <div class="day-bar" id="bar-${i}"></div>
      </div>
    `;
    container.appendChild(row);
  });
}

function handleInput(idx, val) {
  const v = Math.min(parseFloat(val) || 0, 24);
  hours[idx] = v;
  const row = document.getElementById('row-' + idx);
  if (row) row.className = 'day-row' + (v > 0 ? ' has-hours' : '');
  updateAll();
  save();
}

function updateGoal(val) {
  goal = parseInt(val);
  document.getElementById('goal-val').textContent = goal + ' h';
  document.getElementById('goal-display').textContent = goal;
  updateAll();
  save();
}

function updateAll() {
  const total = hours.reduce((a,b) => a+b, 0);
  const pct = Math.min(100, Math.round((total / goal) * 100));
  const remain = Math.max(0, goal - total);
  const active = hours.filter(h => h > 0);
  const avg = active.length ? (total / active.length).toFixed(1) : '—';

  // Battery
  const fill = document.getElementById('battery-fill');
  fill.style.height = pct + '%';
  let color = pct >= 80 ? '#1D9E75' : pct >= 40 ? '#d4870a' : '#c94040';
  fill.style.background = color;

  const glow = document.getElementById('battery-glow');
  glow.style.background = `linear-gradient(to top, ${color}33, transparent)`;
  glow.style.opacity = pct > 5 ? '1' : '0';

  document.getElementById('pct-label').textContent = pct + '%';

  // Segment lines
  const segs = document.getElementById('seg-lines');
  segs.innerHTML = '';
  for (let s = 1; s < 7; s++) {
    const line = document.createElement('div');
    line.className = 'seg-line';
    line.style.bottom = (s / 7 * 100) + '%';
    segs.appendChild(line);
  }

  // Stats
  const fmt = v => v % 1 === 0 ? v : parseFloat(v).toFixed(1);
  document.getElementById('total-val').textContent = fmt(total);
  document.getElementById('remain-val').textContent = fmt(remain);
  document.getElementById('avg-val').textContent = avg;

  // Day bars
  const dailyTarget = goal / 7;
  DAYS.forEach((_, i) => {
    const barPct = Math.min(100, Math.round((hours[i] / Math.max(dailyTarget, 0.1)) * 100));
    const bar = document.getElementById('bar-' + i);
    if (bar) {
      bar.style.width = barPct + '%';
      bar.style.background = color;
    }
  });

  // Motivation
  const mot = document.getElementById('motivation');
  if (pct >= 100) {
    mot.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    mot.classList.add('show');
  } else if (pct >= 75) {
    mot.textContent = '💪 Almost there — keep going!';
    mot.classList.add('show');
  } else if (pct >= 50) {
    mot.textContent = '🔥 Halfway charged!';
    mot.classList.add('show');
  } else {
    mot.classList.remove('show');
  }

  // Slider sync
  document.getElementById('goal-slider').value = goal;
  document.getElementById('goal-val').textContent = goal + ' h';
  document.getElementById('goal-display').textContent = goal;
}

function resetAll() {
  hours = [0,0,0,0,0,0,0];
  DAYS.forEach((_, i) => {
    const inp = document.getElementById('inp-' + i);
    if (inp) { inp.value = ''; }
    const row = document.getElementById('row-' + i);
    if (row) row.className = 'day-row';
  });
  document.getElementById('motivation').classList.remove('show');
  updateAll();
  save();
}

// Week label
document.getElementById('week-label').innerHTML =
  'Week of <span>' + getWeekLabel() + '</span>';

load();
buildRows();
updateAll();
</script>
</body>
</html>
